<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزانتي — مقالات علمية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --text-muted: #666;
            --link: #0066cc;
            --border: #e0e0e0;
            --tag-bg: #f0f0f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d0d0d;
                --text: #e0e0e0;
                --text-muted: #999;
                --link: #58a6ff;
                --border: #222;
                --tag-bg: #1a1a1a;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Naskh Arabic', 'Crimson Pro', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            font-size: 1.1rem;
        }
        /* Header */
        header {
            text-align: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        /* Article List */
        .article {
            padding: 1.2rem 0;
            border-bottom: 1px solid var(--border);
        }
        .article:last-child { border-bottom: none; }
        .article-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .article-title a {
            color: var(--text);
            text-decoration: none;
        }
        .article-title a:hover { color: var(--link); }
        .article-excerpt {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        .article-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .tag {
            background: var(--tag-bg);
            padding: 0.1rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        /* Full Article */
        .full-article {
            padding: 1rem 0;
        }
        .full-article h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .full-article .content {
            white-space: pre-wrap;
            line-height: 2;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--link);
            text-decoration: none;
        }
        /* Stats */
        .stats {
            text-align: center;
            padding: 0.8rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        /* Sections */
        .section-title {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 خزانتي</h1>
        <p>مقالات علمية وطبية مختارة — معلومات تفيد صحتك وعقلك</p>
    </header>

    <div class="stats">
        <span id="article-count">1</span> مقالات • آخر تحديث: مارس 2026
    </div>

    <main id="app"></main>

    <script>
        const articles = [
            {
                id: 1,
                title: "NAD+: جزيء الشباب وكيف تضاعف مستواه",
                excerpt: "NAD+ هو وقود خلاياك. مستوى ينخفض مع التقدم في العمر لكن العلم الحديث وجد طرقاً لرفعه.",
                category: "علوم",
                tags: ["NAD+", "شيخوخة", "ميتوكوندريا"],
                date: "2026-03-14",
                content: `🔬 NAD+: جزيء الشباب — كيف تضاعف مستواه وتعيد ساعتك البيولوجية

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

🎯 ما هو NAD+؟

NAD+ هو جزيء موجود في كل خلية في جسمك. بدونه، تموت. هو وقود الخلايا.

وظائفه الحيوية:
⚡ إنتاج الطاقة في الميتوكوندريا
🔧 إصلاح الحمض النووي (DNA)
🧬 تنظيم أكثر من 500 تفاعل إنزيمي
🛡️ حماية الخلايا من الشيخوخة

مستوى NAD+ ينخفض مع التقدم في العمر:
• عمر 30 سنة: 100%
• عمر 50 سنة: ~50%
• عمر 60+ سنوات: ~25%

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📊 النتائج العلمية (Nature Metabolism 2026):

✅ 14 يوماً من تناول 1 غرام يومياً = تضاعف مستويات NAD+
✅ 12 أسبوعاً من NMN = تحسن جودة النوم + سرعة المشي
✅ NMNH الجديد = مضاعفة المستوى ثلاث مرات

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

✅ البروتوكول العملي:

• NMN: 500-1000 ملغ يومياً
• مصادر طبيعية: حليب البقر، التوفو، السالمون
• رياضة منتظمة + نوم 7-8 ساعات
• صيام متقطع (16:8)

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

🔗 المصدر: Nature Metabolism, Nestlé Research 2026`
            }
        ];

        function render() {
            const app = document.getElementById('app');
            const hash = window.location.hash;

            if (hash.startsWith('#article=')) {
                const id = parseInt(hash.replace('#article=', ''));
                const article = articles.find(a => a.id === id);
                if (article) {
                    app.innerHTML = `
                        <a href="#" class="back-link">← العودة للمقالات</a>
                        <div class="full-article">
                            <h1>${article.title}</h1>
                            <div class="article-meta">
                                <span class="tag">${article.category}</span>
                                <span>${article.date}</span>
                            </div>
                            <div style="margin: 0.5rem 0;">
                                ${article.tags.map(t => `<span class="tag">#${t}</span>`).join(' ')}
                            </div>
                            <div class="content">${article.content}</div>
                        </div>
                    `;
                    return;
                }
            }

            app.innerHTML = articles.map(a => `
                <div class="article">
                    <div class="article-title">
                        <a href="#article=${a.id}">${a.title}</a>
                    </div>
                    <div class="article-excerpt">${a.excerpt}</div>
                    <div class="article-meta">
                        <span class="tag">${a.category}</span>
                        <span>${a.date}</span>
                        ${a.tags.map(t => `<span class="tag">#${t}</span>`).join(' ')}
                    </div>
                </div>
            `).join('');
        }

        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
