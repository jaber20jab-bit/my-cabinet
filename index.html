<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon الرقمية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f23;
            --bg-card: #1a1a2e;
            --surface: #16213e;
            --text: #ffffff;
            --text-secondary: #b8c1ec;
            --text-muted: #6b7280;
            --accent-1: #ff6b6b;
            --accent-2: #4ecdc4;
            --accent-3: #ffe66d;
            --accent-4: #a855f7;
            --accent-5: #3b82f6;
            --gradient-1: linear-gradient(135deg, #ff6b6b, #ff8e53);
            --gradient-2: linear-gradient(135deg, #4ecdc4, #44a08d);
            --gradient-3: linear-gradient(135deg, #a855f7, #6366f1);
            --gradient-4: linear-gradient(135deg, #3b82f6, #06b6d4);
            --gradient-5: linear-gradient(135deg, #f59e0b, #ef4444);
            --card-radius: 20px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Arabic', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .orb:nth-child(1) {
            width: 600px; height: 600px;
            background: var(--accent-1);
            top: -200px; right: -200px;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-2);
            bottom: -100px; left: -100px;
            animation-delay: -5s;
        }

        .orb:nth-child(3) {
            width: 500px; height: 500px;
            background: var(--accent-4);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ===== HEADER ===== */
        .header {
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 35, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            background: var(--gradient-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav {
            display: flex;
            gap: 0.3rem;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav a:hover {
            color: var(--text);
            background: rgba(255,255,255,0.08);
        }

        /* ===== HERO ===== */
        .hero {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem 3rem;
            text-align: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(78, 205, 196, 0.1);
            color: var(--accent-2);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(78, 205, 196, 0.2);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #b8c1ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== STATS ===== */
        .stats {
            max-width: 1000px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.2rem 2rem;
            text-align: center;
            min-width: 140px;
            backdrop-filter: blur(10px);
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 900;
        }

        .stat-num.c1 { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-num.c2 { background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-num.c3 { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* ===== ARTICLES GRID ===== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100%; height: 4px;
            border-radius: var(--card-radius) var(--card-radius) 0 0;
            transition: height 0.3s;
        }

        .card:nth-child(1)::before { background: var(--gradient-1); }
        .card:nth-child(2)::before { background: var(--gradient-2); }
        .card:nth-child(3)::before { background: var(--gradient-3); }
        .card:nth-child(4)::before { background: var(--gradient-4); }
        .card:nth-child(5)::before { background: var(--gradient-5); }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: var(--shadow);
        }

        .card:hover::before {
            height: 6px;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.8rem;
        }

        .card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .card h3 a {
            color: var(--text);
            text-decoration: none;
        }

        .card:hover h3 a {
            color: var(--accent-2);
        }

        .card-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .tag {
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag.active {
            background: rgba(78, 205, 196, 0.15);
            color: var(--accent-2);
        }

        /* ===== ARTICLE VIEW ===== */
        .article-view {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .article-view.active { display: block; }
        .article-list.hidden { display: none; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            padding: 0.6rem 1.2rem;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 12px;
            transition: all 0.3s;
            border: 1px solid rgba(78, 205, 196, 0.2);
        }

        .back-btn:hover {
            background: rgba(78, 205, 196, 0.2);
            transform: translateX(-3px);
        }

        .article-view h1 {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #b8c1ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .article-view .content {
            white-space: pre-wrap;
            line-height: 2.2;
            font-size: 1.05rem;
            color: var(--text-secondary);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header { padding: 0.8rem 1rem; }
            .logo { font-size: 1.2rem; }
            .nav a { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
            .hero { padding: 2.5rem 1rem 2rem; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 1rem; }
            .stats { gap: 0.8rem; padding: 0 1rem; }
            .stat-card { padding: 1rem 1.5rem; min-width: 100px; }
            .stat-num { font-size: 1.5rem; }
            .container { padding: 0 1rem 3rem; }
            .articles-grid { grid-template-columns: 1fr; }
            .card { padding: 1.2rem; }
            .article-view { padding: 1rem; }
            .article-view h1 { font-size: 1.4rem; }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: slideUp 0.5s ease-out;
        }

        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
    </style>
</head>

        function render(data = null) {
            const list = data || articles;
            document.getElementById('articles').innerHTML = list.map((a, i) => `
                <div class="card" onclick="show(${a.id})" style="animation-delay: ${i * 0.1}s">
                    <div class="card-icon">${a.icon}</div>
                    <h3><a href="#article=${a.id}">${a.title}</a></h3>
                    <div class="card-excerpt">${a.excerpt}</div>
                    <div class="card-tags">
                        <span class="tag active">${a.category}</span>
                        ${a.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function show(id) {
            const a = articles.find(x => x.id === id);
            if (!a) return;
            document.getElementById('articleList').classList.add('hidden');
            document.getElementById('articleView').classList.add('active');
            document.getElementById('articleContent').innerHTML = `
                <h1>${a.icon} ${a.title}</h1>
                <div style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <span class="tag active">${a.category}</span>
                    <span class="tag">${a.date}</span>
                </div>
                <div class="content">${a.content}</div>
            `;
            window.scrollTo(0, 0);
        }

        function showList() {
            document.getElementById('articleList').classList.remove('hidden');
            document.getElementById('articleView').classList.remove('active');
            window.location.hash = '';
        }

        function filterCat(cat) {
            render(articles.filter(a => a.category === cat));
            showList();
        }

        // Init
        render();
        if (window.location.hash.startsWith('#article=')) {
            show(parseInt(window.location.hash.replace('#article=', '')));
        }
    </script>
</body>
</html>
