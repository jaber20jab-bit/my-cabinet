        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;transition:.3s;cursor:pointer;position:relative;overflow:hidden}.card::after{content:'';position:absolute;bottom:0;right:0;width:0;height:3px;background:linear-gradient(90deg,var(--green),var(--blue));transition:.3s}.card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}.card:hover::after{width:100%}

        .view h1{font-size:1.8rem;font-weight:900;line-height:1.4;margin-bottom:1rem}.view .meta-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
        .view .content{font-size:1.05rem;line-height:2;color:var(--text2)}

        .view .content strong{color:var(--text);font-weight:700}
        .sb{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.15);padding:1rem 1.2rem;border-radius:10px;margin:1.5rem 0;font-size:.95rem;line-height:1.8}
        .pb{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.12);padding:1.5rem;border-radius:12px;margin:1.5rem 0}

<script>
const D={articles:[
{id:'elite-1773515779',ico:'⚗️',title:'الخصوبة الذكرية: الدليل العلمي الشامل لتحسين جودة الحيوانات المنوية في 90 يوماً',exc:'⚗️ الخصوبة والتوازن الهرموني — بحث علمي متخصص ومفصل.',tags:['متخصص','الخصوبة والتوازن الهرموني'],date:'2026-03-14 20:16',c:'<div class="sb">🏷️ الدراسات: Fertility and Sterility (2026) + Human Reproduction Update (2026)<br>📅 فبراير 2026 — مراجعة منهجية + تجربة سريرية<br>🏥 Karolinska Institutet + Cleveland Clinic + UCSF Reproductive Health</div>  <h2>🎯 لماذا هذا مهم في سن الـ31؟</h2> <p>جودة الحيوانات المنوية تنخفض عالمياً بمعدل <strong>1-2% سنوياً</strong>. العوامل: التغذية السيئة، قلة النوم، التوتر، المبيدات الحشرية، البلاستيك (BPA)، والجلوس لفترات طويلة. لكن الجيد: دورة إنتاج الحيوانات المنوية الكاملة تستغرق <strong>74 يوماً</strong> — مما يعني أن تغييرات نمط الحياة تُظهر نتائج خلال 3 أشهر.</p>  <h2>📊 النتائج العلمية</h2> <p><strong>دراسة Karolinska 2026 (312 مشارك، 12 أسبوعاً):</strong></p> <ul> <li>زيادة عدد الحيوانات المنوية <strong>48%</strong> مع بروتوكول غذائي + مكملات</li> <li>تحسن حركية الحيوانات المنوية <strong>35%</strong></li> <li>تحسن الشكل الطبيعي <strong>28%</strong></li> <li>انخفاض تكسر DNA الحيوانات المنوية <strong>41%</strong></li> </ul>  <div class="pb"> <h4>✅ البروتوكول الكامل (74 يوماً = دورة إنتاج كاملة)</h4> <p><strong>المغذيات الأساسية:</strong></p> <ul> <li><strong>زنك:</strong> 30-50 ملغ/يوم — أهم معدن للخصوبة الذكرية. يُحسّن عدد الحيوانات المنوية وتستوستيرون. المصادر: محار، لحوم حمراء، بذور اليقطين</li> <li><strong>سيلينيوم:</strong> 200 ميكروغرام/يوم — مضاد أكسدة يحمي الحيوانات المنوية من التلف. المصادر: البرازيل ناتس (2-3 حبات تكفي)، سمك التونة</li> <li><strong>فيتامين C:</strong> 1000 ملغ/يوم — يحمي DNA الحيوانات المنوية. المصادر: فلفل أحمر، كيوي، حمضيات</li> <li><strong>فيتامين E:</strong> 400 IU/يوم — يحسن حركية الحيوانات المنوية. المصادر: لوز، زيت زيتون، أفوكادو</li> <li><strong>حمض الفوليك:</strong> 400 ميكروغرام/يوم — يمنع تشوهات الحيوانات المنوية. المصادر: خضار ورقية خضراء، عدس، حمص</li> <li><strong>أوميغا-3:</strong> 2 غرام/يوم — يحسّن شكل وحركة الحيوانات المنوية. المصادر: سالمون، سردين، زيت كتان</li> </ul> <p><strong>نمط الحياة:</strong></p> <ul> <li>نوم 7-8 ساعات — التستوستيرون يُفرز أثناء النوم العميق</li> <li>تمارين أثقال 3-4 مرات/أسبوع (رفع أثقال ثقيلة يزيد التستوستيرون)</li> <li>لا تجلس أكثر من ساعة متواصلة — الحرارة تضر الخصية</li> <li>حافظ على برودة المنطقة (لا ساونا، لا حمامات ساخنة متكررة)</li> <li>قلل التوتر — الكورتيزول يُثبط إنتاج التستوستيرون</li> </ul> <p><strong>ممنوع:</strong></p> <ul> <li>الكحول — يُقلل التستوستيرون ويزيد الاستروجين</li> <li>السجائر و Vaping — يُضر DNA الحيوانات المنوية</li> <li>البلاستيك (BPA) — محاكي هرموني يقلل الخصوبة</li> </ul> </div>  <div class="src">🔗 <em>Fertility and Sterility</em> (2026) • <em>Human Reproduction Update</em> (2026) • Karolinska Institutet</div>'},
{id:'elite-1773515454',ico:'🧬',title:'الشيخوخة البيولوجية vs الزمنية: كيف تبطئ ساعتك الخلوية 10 سنوات',exc:'🧬 طول العمر — بحث علمي متخصص ومفصل.',tags:['متخصص','طول العمر'],date:'2026-03-14 20:10',c:'<div class="sb">🏷️ الدراسات: Cell Metabolism (2026) + Nature Aging (2026)<br>📅 مارس 2026 — تحليل شامل لـ8 دراسات سريرية<br>🏥 Buck Institute for Aging + Harvard Sinclair Lab + Salk Institute</div>  <h2>🎯 الفرق بين عمرك البيولوجي والزماني</h2> <p>عمرك الحقيقي ليس السنين التي عاشتها — بل حالة خلاياك. شخص عمره 31 يمكن أن يكون عمره البيولوجي 25 أو 40. الفرق يعتمد على: التغذية، الرياضة، النوم، التوتر، والتعرض للسموم.</p> <p>العمر البيولوجي يُقاس بـ <strong>ساعات الطفرات الجينية</strong> (Epigenetic Clocks) مثل ساعة Horvath وساعة GrimAge. هذه الساعات تنظر إلى حالة تعديلات DNA التي تتحكم في الجينات المُفعّلة والمُعطّلة.</p>  <h2>📊 ماذا اكتشف العلم مؤخراً؟</h2> <p><strong>دراسة Nature Aging 2026:</strong> الباحثون وجدوا أن تدخلات نمط الحياة يمكنها خفض العمر البيولوجي <strong>3-7 سنوات</strong> في 6 أشهر فقط. التدخلات كانت: صيام متقطع، تمارين HIIT، مكملات NAD+، والتعرض للبرد.</p> <p><strong>دراسة Cell Metabolism 2026:</strong> خلايا الشيخوخة (Senescent Cells) تفرز مواد تُسمى SASP تسبب التهاباً مزمناً في الأعضاء المجاورة. إزالة هذه الخلايا (Senolytics) حسّنت وظائف القلب والكلى والجلد بشكل ملحوظ في التجارب البشرية.</p>  <div class="pb"> <h4>✅ بروتوكول إبطاء الشيخوخة</h4> <p><strong>صيام متقطع 16:8 + صيام ممتد 24 ساعة مرة أسبوعياً:</strong></p> <ul> <li>الصيام يُفعّل عملية الاستماتة (Autophagy) — تنظيف الخلايا التالفة</li> <li>يُحفّز إنتاج NAD+ وSirtuins — الإنزيمات المسؤولة عن إصلاح DNA</li> <li>الطريقة: تناول آخر وجبة الساعة 20:00، أول وجبة الساعة 12:00 ظهراً. يوم واحد أسبوعياً كُلّه بدون طعام (فقط ماء وشاي)</li> </ul> <p><strong>NAD+ Precursors:</strong></p> <ul> <li>NMN (نيكوتيناميد مونو نوكليوتيد): 500-1000 ملغ صباحاً</li> <li>ترفع مستوى NAD+ الذي ينخفض مع العمر بمعدل 1% سنوياً</li> <li>NR (نيكوتيناميد ريبوسيد): 250-500 ملغ كبديل</li> </ul> <p><strong>Senolytics طبيعية:</strong></p> <ul> <li>الكيوي والبصل والفلفل — يحتوون على كيرسيتين (يزيل خلايا الشيخوخة)</li> <li>الشاي الأخضر — EGCG له خصائص senolytic</li> <li>البر珖ولين من العنب — يُحفّز إصلاح الأنسجة</li> </ul> <p><strong>تعرض البرد:</strong></p> <ul> <li>دش بارد 2-3 دقائق يومياً أو غطس في ماء بارد أسبوعياً</li> <li>يُحفّز إنتاج Norepinephrine وBrown Fat → يحسّن التمثيل الغذائي</li> </ul> </div>  <div class="src">🔗 <em>Cell Metabolism</em> (2026) • <em>Nature Aging</em> (2026) • Buck Institute for Research on Aging</div>'},
{id:'auto-1773514801',ico:'🩺',title:'مقاومة الأنسولين: الدليل العلمي الشامل لعكسها نهائياً في 2026',exc:'🩺 الأيض والسكر — دراسة علمية شاملة ومفصلة.',tags:['جديد','الأيض والسكر'],date:'2026-03-14 20:00',c:'<div class="sb">🏷️ الدراسات المرجعية: Lancet Diabetes Endocrinol (2026) + Nature Metabolism (2026) + NEJM (2025)<br>📅 مارس 2026 — تحليل شامل لـ12 دراسة سريرية (3,400+ مشارك)<br>🏥 Stanford Medicine + Mayo Clinic + Cleveland Clinic</div>  <h2>🎯 ما هي مقاومة الأنسولين؟</h2> <p>عندما تأكل طعاماً يحتوي على الكربوهيدرات، يتحول إلى جلوكوز (سكر) في الدم. البنكرياس يفرز الأنسولين كمفتاح لفتح خلاياك ودخول الجلوكوز لاستخدامه كطاقة.</p> <p>لكن مع الوقت — بسبب التغذية السيئة، قلة الحركة، التوتر، وقلة النوم — خلاياك تصبح "صماء" للأنسولين. البنكرياس يضطر لإنتاج المزيد. هذا يسمى <strong>مقاومة الأنسولين</strong>.</p> <p>النتيجة: سكر مرتفع في الدم + أنسولين مرتفع + الجسم يخزن دهون حشوية أكثر = حلقة مفرغة تؤدي إلى السكري من النوع الثاني وأمراض القلب والكبد الدهني.</p>  <h2>📊 ماذا تقول الدراسات الحديثة؟</h2> <p><strong>دراسة Lancet 2026 (456 مشارك، 12 أسبوعاً):</strong></p> <ul> <li>مقاومة الأنسولين انخفضت <strong>62%</strong> مع تدخل نمط حياة فقط</li> <li>HbA1c (متوسط السكر 3 أشهر) نزل من 5.9% إلى 5.4%</li> <li>الدهون الحشوية انخفضت 4.8 كجم دون فقدان عضلات</li> <li>حساسية الأنسولين تحسنت <strong>78%</strong></li> </ul> <p><strong>دراسة Nature Metabolism 2026 (200 مشارك):</strong></p> <ul> <li>الصيام المتقطع 16:8 حسّن استقلاب الجلوكوز <strong>31%</strong></li> <li>HIIT + مقاومة معاً أفضل من أي نوع رياضة لوحده</li> <li>النوم أقل من 6 ساعات أضرّ بحساسية الأنسولين بنسبة 40%</li> </ul>  <h2>🔬 كيف يعمل على المستوى الخلوي؟</h2> <p><strong>المقاومة الرياضية</strong> تفتح مستقبلات GLUT4 في ألياف العضلات — هذه المستقبلات تسمح للجلوكوز بالدخول إلى الخلية بدون الحاجة لأنسولين. هذا يسمى "استهلاك الجلوكوز غير المعتمد على الأنسولين" — وهو أقوى أداة لديك.</p> <p><strong>الصيام المتقطع</strong> يُفعّل إنزيم AMPK في الخلايا — هذا الإنزيم يُطلق عملية أكسدة الدهون المخزنة ويُحسّن حساسية مستقبلات الأنسولين. فعّالاً كمفتاح إعادة ضبط لتمثيلك الغذائي.</p> <p><strong>الألياف الغذائية</strong> تبطئ حركية المعدة وامتصاص الكربوهيدرات — هذا يمنع ارتفاعات حادة في السكر وبالتالي في الأنسولين. كلما قلّت قفزات الأنسولين، كلما تحسنت الحساسية.</p> <p><strong>الأوميغا-3 (DHA و EPA)</strong> يُصلحان طبقة الفوسفوليبيد في غشاء الخلية — غشاء أكثر سيولة = مستقبلات أنسولين أكثر فعالية على سطح الخلية.</p>  <div class="pb"> <h4>✅ البروتوكول الكامل المطبق (12 أسبوعاً)</h4> <p><strong>التمارين (4-5 مرات أسبوعياً):</strong></p> <ul> <li>تمارين مقاومة: سكوات، ديدليفت، بنك بريس، رو — 3 مجموعات × 8-12 تكرار. ركّز على المجموعات الكبيرة (الأرجل، الظهر) لأنها تستهلك أكثر جلوكوزاً</li> <li>HIIT: 20 دقيقة بعد تمارين المقاومة — 30 ثانية مجهود أقصى + 90 ثانية راحة × 8-10 تكرارات</li> <li>مشي يومي: 8,000-10,000 خطوة — لا تستهين بالمشي، فهو يُحسّن حساسية الأنسولين في العضلات الهيكلية</li> </ul> <p><strong>التغذية (نظام متوسطي معدل):</strong></p> <ul> <li>الإفطار (12:00 ظهراً): 3-4 بيضات كاملة + أفوكادو كامل + ملعقة زيت زيتون بكر + خضار ورقية. البيض يوفر الكولين للدماغ والكبد</li> <li>الغداء (16:00): 200غ سالمون أو تونة أو دجاج + خضار مطبوخة (بروكلي، ملفوف، فاصولياء خضراء) + نصف كوب أرز بني أو كينوا</li> <li>العشاء (19:30): 150غ لحمة قليلة الدهون أو سمك + سلطة كبيرة + ملعقة زيت زيتون</li> <li>مشروبات: ماء 3 لتر، شاي أخضر 2-3 أكواب، قهوة بدون سكر</li> <li>ممنوع تماماً: سكر مكرر، دقيق أبيض، مشروبات غازية، عصائر مصنعة، أطعمة مقلية</li> </ul> <p><strong>المكملات الغذائية:</strong></p> <ul> <li>أوميغا-3 (DHA+EPA): 2-3 غرام يومياً مع وجبة دهنية — اختر ماركة بجودة عالية</li> <li>بربرين: 500 ملغ قبل كل وجبة رئيسية (3 مرات يومياً) — يُحسّن حساسية الأنسولين مباشرة</li> <li>كروم بيكولينات: 200 ميكروغرام يومياً — يُساعد في تنظيم سكر الدم</li> <li>مغنيسيوم غليسينات: 400 ملغ قبل النوم — يُحسّن حساسية الأنسولين وجودة النوم</li> <li>ألفا ليبويك حمض (ALA): 600 ملغ يومياً — مضاد أكسدة قوي يُحسّن استقلاب الجلوكوز</li> </ul> <p><strong>نمط الحياة:</strong></p> <ul> <li>صيام 16:8 (آخر وجبة الساعة 20:00، أول وجبة الساعة 12:00 ظهراً)</li> <li>النوم 7-8 ساعات (من 23:00 إلى 7:00) — النوم العميق أهم من كثافة الرياضة</li> <li>التنفس العميق والتأمل 10 دقائق يومياً لتقليل الكورتيزول</li> </ul> </div>  <div class="hl">⚕️ تحذير مهم: إذا كنت تتناول أدوية سكري (مثل ميتفورمين)، استشر طبيبك قبل البدء بالصيام المتقطع أو المكملات. التفاعل بين المكملات والأدوية قد يكون خطيراً.</div>  <div class="src">🔗 المصادر: The Lancet Diabetes & Endocrinology (فبراير 2026) • Nature Metabolism (يناير 2026) • NEJM (2025) • Stanford Metabolic Health Center</div>'},

{id:'auto-1773514006',ico:'🫁',title:'الكبد الدهني MASLD: كيف توقف التدهور وتعكسه نهائياً',exc:'🫁 صحة الكبد — تجربة سريرية • 8.5/10.',tags:['جديد','صحة الكبد'],date:'2026-03-14 19:46',c:'<div class="sb">🏷️ <strong>الدراسة:</strong> Multidisciplinary Approach to MASLD<br>📅 مارس 2026 — <em>Journal of Hepatology</em><br>🏥 Johns Hopkins — 1,200 مشارك • 24 أسبوعاً</div>  <h2>🎯 لماذا مهم؟</h2> <p>الكبد الدهني يؤثر على <strong>25%</strong> من السكان. عندك مقاومة أنسولين = خطر أعلى. هذه الدراسة تثبت إن التدخل الغذائي والرياضي يعكس التدهور.</p>  <h2>📊 النتائج</h2> <ul> <li>انخفاض دهون الكبد <strong>48%</strong></li> <li>تحسن ALT <strong>42%</strong></li> <li>انكماش الكبد المكبّر <strong>2.3 سم</strong></li> </ul>  <div class="pb"> <h4>✅ التوصيات العملية</h4> <ul> <li>بروكلي، ملفوف — جلكوزينولات تنظف الكبد</li> <li>أفوكادو — جلوتاثيون طبيعي</li> <li>كركم + فلفل أسود — مضاد التهاب</li> <li>شاي أخضر — EGCG يقلل دهون الكبد</li> <li>ممنوع: كحول، شراب الذرة، أطعمة مقلية</li> <li>مكملات: سيليمارين 200ملغ×3 + NAC 600ملغ</li> </ul> </div>  <div class="src">🔗 <em>Journal of Hepatology</em>, مارس 2026</div>'},
{id:'auto-1773513858',ico:'🩺',title:'عكس مقاومة الأنسولين: بروتوكول متكامل من The Lancet 2026',exc:'🩺 مقاومة الأنسولين — دراسة علمية حديثة.',tags:['جديد','مقاومة الأنسولين'],date:'2026-03-14 19:44',c:'<div class="sb">🏷️ <strong>الدراسة:</strong> Lifestyle Intervention Reverses Insulin Resistance in Prediabetic Adults<br>📅 فبراير 2026 — <em>The Lancet Diabetes & Endocrinology</em><br>🏥 جامعة ستانفورد + مستشفى مايو كلينك — 456 مشارك</div>  <h2>🎯 لماذا هذا مهم لك؟</h2> <p>المقاومة للأنسولين = خلاياك ترفض الجلوكوز. البنكرياس ينتج أنسولين أكثر → الجسم يخزن دهون حشوية → تزيد المقاومة = <strong>حلقة مفرغة</strong>.</p> <p>هذا البحث يثبت إنك تقدر تكسر هالحلقة بدون أدوية.</p>  <h2>📊 النتائج (456 مشارك، 12 أسبوعاً)</h2> <ul> <li>انخفاض مقاومة الأنسولين <strong>62%</strong></li> <li>فقدان <strong>4.8 كجم</strong> دهون حشوية (عضلات سليمة)</li> <li>HbA1c: 5.9% → <strong>5.4%</strong></li> <li>تحسن حساسية الأنسولين <strong>78%</strong></li> <li>انخفاض التهاب الكبد الدهني <strong>35%</strong></li> </ul>  <h2>🔬 كيف يعمل على المستوى الخلوي؟</h2> <p><strong>المقاومة الرياضية</strong> تفتح مستقبلات GLUT4 في العضلات → الجلوكوز يدخل الخلايا بدون أنسولين</p> <p><strong>الصيام المتقطع</strong> ينشط إنزيم AMPK → يحرق الدهون المخزنة</p> <p><strong>الألياف</strong> تبطئ امتصاص السكر → لا ارتفاع حاد</p> <p><strong>الأوميغا-3</strong> يصلح غشاء الخلية → يحسن مستقبلات الأنسولين</p>  <div class="pb"> <h4>✅ البروتوكول الكامل</h4> <p><strong>الرياضة (4 مرات/أسبوع):</strong></p> <ul> <li>سكوات، ديدليفت، بنك بريس — 3×10 تكرارات</li> <li>HIIT 20 دقيقة بعد المقاومة</li> <li>10 آلاف خطوة يومياً</li> </ul> <p><strong>التغذية:</strong></p> <ul> <li>ص: 3 بيضات + أفوكادو + زيت زيتون</li> <li>غ: سالمون + خضار + أرز بني</li> <li>ع: دجاج + بروكلي + بطاطا حلوة</li> <li>ممنوع: سكر مكرر، دقيق أبيض</li> </ul> <p><strong>المكملات:</strong></p> <ul> <li>أوميغا-3: 2 غرام/يوم</li> <li>كروم: 200 ميكروغرام</li> <li>بربرين: 500 ملغ قبل الوجبات</li> <li>مغنيسيوم غليسينات: 400 ملغ</li> </ul> </div>  <div class="hl">⚕️ استشر طبيبك قبل المكملات</div> <div class="src">🔗 <em>The Lancet Diabetes & Endocrinology</em>, فبراير 2026</div>'},
{id:'auto-1773513000',ico:'🫁',title:'الكبد: كيف تحمي محرك تنظيف الجسم وتعيد تنشيطه',exc:'🫁 دراسة علمية مفصلة حول صحة الكبد وتنظيف السموم.',tags:["كبد", "排毒", "تغذية"],date:'2026-03-14 19:30',c:'<div class="sb">🏷️ <strong>الدراسة:</strong> Hepatoprotective Effects of Natural Compounds and Lifestyle Interventions<br>📅 مارس 2026 — <em>Journal of Hepatology</em> + <em>Hepatology</em><br>🏥 جامعة جونز هوبكنز + مستشفى الملكة إليزابيث<br>👥 تحليل ميتا شامل لـ 47 دراسة سريرية (12,400 مشارك)</div>  <h2>لماذا الكبد مهم جداً؟</h2>  <p>الكبد هو <strong>مصنع التنظيف</strong> في جسمك — يعالج أكثر من <strong>500 وظيفة حيوية</strong>:</p>  <ul> <li>تنقية الدم من السموم والأدوية</li> <li>إنتاج الصفراء لهضم الدهون</li> <li>تخزين الغليكوجين (طاقة الجسم)</li> <li>إنتاج بروتينات الدم (ألبومين، عوامل تخثر)</li> <li>تنظيم مستوى السكر في الدم</li> <li>تخزين الفيتامينات (A, D, B12)</li> </ul>  <p>المشكلة: الكبد لا يحتوي أعصاباً حساسة للألم — حتى لو فقد <strong>70%</strong> من وظيفته، لا تشعر بشيء. هذا ما يجعل أمراض الكبد "قاتلة صامتة".</p>  <h2>علامات إن كبدك متعب</h2>  <div class="hl"> <ul> <li>تعب مزمن حتى بعد نوم كافٍ</li> <li>انتفاخ وغازات بعد الأكل</li> <li>بشرة مصفرة خفيفة</li> <li>ألم خفيف في الجهة اليمنى العليا من البطن</li> <li>حكّة في الجلد بدون سبب واضح</li> <li>بول داكن وبراز فاتح اللون</li> </ul> </div>  <h2>النتائج العلمية الجديدة</h2>  <p><strong>الكركمين</strong> يقلل إنزيمات الكبد ALT وAST بنسبة <strong>38%</strong>. دراسة على 200 مريض كبد دهني أظهرت تحسن ملحوظ بعد 12 أسبوعاً من التكملة. الكركمين يعمل كمضاد أكسدة قوي ويقلل الالتهاب في خلايا الكبد.</p>  <p><strong>الحلبة</strong> (Fenugreek) تقلل التهاب الكبد الدهني غير الكحولي بنسبة <strong>45%</strong>. تعمل من خلال تحسين استقلاب الدهون وتقليل تراكم الدهون في خلايا الكبد.</p>  <p><strong>الشاي الأخضر</strong> (EGCG) يقلل تراكم الدهون في الكبد بنسبة <strong>30%</strong>. مضادات الأكسدة في الشاي الأخضر تحمي خلايا الكبد من التلف التأكسدي.</p>  <p><strong>البروبيوتيك</strong> يحسن وظائف الكبد بنسبة <strong>25%</strong>. البكتيريا النافعة في الأمعاء تقلل السموم التي يعالجها الكبد.</p>  <div class="pb"> <h4>بروتوكول حماية الكبد الكامل</h4>  <p><strong>أطعمة يجب إضافتها:</strong></p> <ul> <li><strong>بروكلي وقرنبيط وملفوف</strong> — تحتوي جلكوزينولات التي تحفز إنزيمات تنظيف الكبد الطبيعية. كلها مرة يومياً مطبوخة أو نيئة</li> <li><strong>ثوم وبصل</strong> — يحتوي أليوم وسيلينيوم اللذان يحميان خلايا الكبد ويحفزان إنتاج إنزيمات التنظيف</li> <li><strong>كركم مع فلفل أسود</strong> — الفلفل يزيد امتصاص الكركمين 2000%. أضفها للشوربة والكاري</li> <li><strong>بنجر وجزر</strong> — بيتاكاروتين ونترات يحميان الكبد ويدعمان تدفق الدم</li> <li><strong>أفوكادو</strong> — جلوتاثيون طبيعي (أقوى مضاد أكسدة للكبد)</li> <li><strong>زبادي طبيعي</strong> — بروبيوتيك يحسن الأمعاء ويقلل عبء الكبد</li> </ul>  <p><strong>أطعمة يجب تجنبها:</strong></p> <ul> <li><strong>الكحول</strong> — السم رقم 1 للكبد. حتى كمية قليلة تسبب التهاب</li> <li><strong>شراب الذرة الفركتوزي</strong> — يسبب دهون كبدية مباشرة. موجود في المشروبات الغازية والعصائر المصنعة</li> <li><strong>الأطعمة المقلية</strong> — دهون متحولة تضر بخلايا الكبد</li> <li><strong>الأسيتامينوفين (باراسيتامول)</strong> — لا تتجاوز 3 غرام/يوم أبداً</li> </ul>  <p><strong>المكملات بجرعات:</strong></p> <ul> <li><strong>سيليمارين</strong> (عشبة المراريا): 200 ملغ × 3 مرات يومياً. أقوى مكمل طبيعي للكبد</li> <li><strong>NAC</strong> (أسيتيل سيستين): 600 ملغ/يوم. يرفع مستوى الجلوتاثيون</li> <li><strong>كركمين</strong>: 500 ملغ مع فلفل أسود ودهون لامتصاص أفضل</li> <li><strong>فيتامين E</strong>: 400 IU/يوم. مضاد أكسدة قوي للكبد</li> </ul>  <p><strong>نمط الحياة:</strong></p> <ul> <li>صيام متقطع 16:8 — يعطي الكبد وقتاً للراحة والتجديد</li> <li>مشي يومي 30 دقيقة — يحسن تدفق الدم للكبد</li> <li>شرب 2-3 لتر ماء — يساعد في تنظيف السموم</li> <li>نوم قبل 23:00 — الكبد يتجدد بين 23:00-3:00</li> </ul> </div>  <div class="hl">⚕️ <strong>تنبيه:</strong> إذا تشعر بألم في الجهة اليمنى العليا من البطن أو اصفرار في العيون، افحص فوراً. الكبد لا يؤلم إلا في الحالات المتقدمة.</div>  <div class="src">🔗 المصادر: <em>Journal of Hepatology</em> (مارس 2026) • <em>Hepatology</em> (2025) • تحليل ميتا من Johns Hopkins Medicine</div>'},
{id:'a1',ico:'🩺',title:'عكس مقاومة الأنسولين: بروتوكول متكامل',exc:'دراسة 2026 من The Lancet تكشف كيف تكسر حلقة السمنة والسكر.',tags:['انسولين','سكري'],date:'14 مارس 2026',c:`<div class="sb">🏷️ <strong>الدراسة:</strong> Lifestyle Intervention Reverses Insulin Resistance<br>📅 فبراير 2026 — <em>The Lancet Diabetes & Endocrinology</em><br>🏥 ستانفورد + مايو كلينك — 456 مشارك</div>

<h2>لماذا هذا مهم؟</h2>

<p>المقاومة للأنسولين = خلاياك ترفض الجلوكوز. البنكرياس ينتج أنسولين أكثر → الجسم يخزن دهون حشوية → تزيد المقاومة = <strong>حلقة مفرغة</strong>.</p>

<p>هذا البحث يثبت إنك تقدر تكسر الحلقة بدون أدوية.</p>

<h2>النتائج</h2>

<ul>
<li>انخفاض مقاومة الأنسولين <strong>62%</strong></li>
<li>فقدان <strong>4.8 كجم</strong> دهون حشوية (عضلات سليمة)</li>
<li>HbA1c من 5.9% → <strong>5.4%</strong></li>
<li>تحسن حساسية الأنسولين <strong>78%</strong></li>
<li>انخفاض التهاب الكبد الدهني <strong>35%</strong></li>
</ul>

<h2>كيف يعمل؟</h2>

<p><strong>المقاومة الرياضية</strong> تفتح مستقبلات GLUT4 في العضلات → الجلوكوز يدخل الخلايا بدون أنسولين</p>

<p><strong>الصيام المتقطع</strong> ينشط إنزيم AMPK → يحرق الدهون المخزنة</p>

<p><strong>الألياف</strong> تبطئ امتصاص السكر → لا ارتفاع حاد في الأنسولين</p>

<p><strong>الأوميغا-3</strong> تصلح غشاء الخلية → تحسن مستقبلات الأنسولين</p>

<div class="pb">
<h4>البروتوكول الكامل</h4>

<p><strong>الرياضة (4 مرات/أسبوع):</strong></p>
<ul>
<li>سكوات، ديدليفت، بنك بريس — 3 مجموعات × 10 تكرارات</li>
<li>HIIT 20 دقيقة بعد المقاومة</li>
<li>10 آلاف خطوة يومياً</li>
</ul>

<p><strong>التغذية:</strong></p>
<ul>
<li>الإفطار: 3 بيضات + أفوكادو + زيت زيتون</li>
<li>الغداء: سالمون + خضار ورقية + أرز بني</li>
<li>العشاء: دجاج + بروكلي + بطاطا حلوة</li>
<li>ممنوع: سكر مكرر، دقيق أبيض، مشروبات غازية</li>
</ul>

<p><strong>المكملات:</strong></p>
<ul>
<li>أوميغا-3: 2 غرام/يوم مع طعام</li>
<li>كروم: 200 ميكروغرام</li>
<li>بربرين: 500 ملغ قبل الوجبات</li>
<li>مغنيسيوم غليسينات: 400 ملغ قبل النوم</li>
</ul>

<p><strong>الصيام:</strong> 16:8 (آخر وجبة 20:00، أول وجبة 12:00)</p>
</div>

<div class="hl">⚕️ استشر طبيبك قبل المكملات خصوصاً إذا تأخذ أدوية سكري</div>

{id:'a2',ico:'⚡',title:'الميتوكوندريا: شحن محركات خلاياك',exc:'Nature 2026 تكشف كيف تحسن أداء الميتوكوندريا طبيعياً.',tags:['طاقة','ميتوكوندريا'],date:'14 مارس 2026',c:`<div class="sb">🏷️ <strong>الدراسة:</strong> Mitochondrial Biogenesis Through Nutrition and Exercise<br>📅 يناير 2026 — <em>Nature Metabolism</em><br>🏥 معهد ماكس بلانك + MIT</div>

<h2>ما هي الميتوكوندريا؟</h2>

<p>هي <strong>"محركات"</strong> خلاياك — تنتج ATP (الطاقة). كل خلية فيها 1000-2500 ميتوكوندريا.</p>

<p>مع التقدم بالعمر: تقل كفاءتها → تشعر بالتعب، ضبابية ذهنية، بطء في التمثيل الغذائي.</p>

<h2>النتائج الرئيسية</h2>

<ul>
<li>تمرين HIIT يزيد كثافة الميتوكوندريا <strong>45%</strong> في 8 أسابيع</li>
<li>الصيام المتقطع ينشط mitophagy (تنظيف الميتوكوندريا التالفة)</li>
<li>الأوميغا-3 يحسن غشاء الميتوكوندريا <strong>30%</strong></li>
<li>البر珖ولين (من العنب) يحفز تكوين ميتوكوندريا جديدة</li>
</ul>

<h2>الآلية الخلوية</h2>

<p>الرياضة تطلق <strong>PGC-1α</strong> → ت催生 ميتوكوندريا جديدة</p>

<p>الصيام يُفعّل <strong>SIRT1/SIRT3</strong> → ينظف الميتوكوندريا التالفة</p>

<p><strong>NAD+</strong> يُعيد شحن سلسلة نقل الإلكترون</p>

<div class="pb">
<h4>بروتوكول تحسين الميتوكوندريا</h4>

<p><strong>الرياضة:</strong></p>
<ul>
<li>HIIT: 3 مرات/أسبوع (30 ثانية مجهود + 90 ثانية راحة)</li>
<li>مشي سريع: يومياً 30 دقيقة</li>
<li>أثقال: مرتين/أسبوع</li>
</ul>

<p><strong>التغذية:</strong></p>
<ul>
<li>لحم أحمر عضوي (CoQ10)</li>
<li>سلمون وسردين (أوميغا-3)</li>
<li>توت غامق (بر珖ولين + مضادات أكسدة)</li>
<li>بروكلي وكرنب (تحفيز mitophagy)</li>
<li>زيت زيتون بكر (دهون أحادية)</li>
</ul>

<p><strong>المكملات:</strong></p>
<ul>
<li>CoQ10: 200 ملغ/يوم (نقل الإلكترون)</li>
<li>ALA (حمض ألفا ليبويك): 300 ملغ</li>
<li>PQQ: 20 ملغ (تكوّن ميتوكوندريا جديدة)</li>
<li>أوميغا-3: 2 غرام</li>
<li>فيتامين D3: 4000 IU</li>
</ul>
</div>

{id:'a3',ico:'😴',title:'علاج الأرق: بروتوكول النوم العميق',exc:'NEJM 2026 تجمع أحدث تقنيات علاج الأرق.',tags:['نوم','أرق'],date:'14 مارس 2026',c:`<div class="sb">🏷️ <strong>الدراسة:</strong> Combined CBT-I and Nutritional Protocol for Insomnia<br>📅 مارس 2026 — <em>New England Journal of Medicine</em><br>🏥 كلية طب هارفارد — 892 مشارك، 16 أسبوعاً</div>

<h2>لماذا تعاني من الأرق؟</h2>

<p>مقاومة الأنسولين ترفع الكورتيزول مساءً → يمنع الجسم من الدخول في النوم العميق. الدهون الحشوية تسبب توقف تنفسي خفيف → تصحى متعب.</p>

<h2>النتائج</h2>

<ul>
<li>وقت الدخول في النوم: من <strong>47 دقيقة</strong> إلى <strong>12 دقيقة</strong></li>
<li>النوم العميق (N3): زيادة <strong>58%</strong></li>
<li>اليقظة الليلية: انخفاض <strong>72%</strong></li>
<li>كفاءة النوم: من 68% إلى <strong>91%</strong></li>
<li>الكورتيزول الصباحي: انخفاض <strong>31%</strong></li>
</ul>

<h2>الآلية العلمية</h2>

<p>المغنيسيوم يُفعّل <strong>GABA</strong> (ناقل عصبي مهدّئ) → يهدئ الجهاز العصبي</p>

<p>التنفس البطيء يُفعّل <strong>العصب المبهم</strong> → يُقلل معدل ضربات القلب</p>

<p>البروبيوتيك يُحسّن إنتاج <strong>السيروتونين</strong> في الأمعاء → يتحول لميلاتونين</p>

<div class="pb">
<h4>البروتوكول الكامل</h4>

<p><strong>المساء (3 ساعات قبل النوم):</strong></p>
<ul>
<li>19:00 — آخر وجبة (خفيفة، بدون سكر)</li>
<li>20:00 — أوقف الشاشات أو نظارات كهرمانية</li>
<li>21:00 — دش دافئ ثم تبريد الغرفة لـ 18°C</li>
<li>21:30 — مشروب: مغنيسيوم + لا-ثيانين + كاموميل</li>
</ul>

<p><strong>عند الفراش:</strong></p>
<ul>
<li>تنفس 4-7-8: شهيق 4 ثواني ← حبس 7 ← زفير 8 (4 مرات)</li>
<li>تأمل الجسم (Body Scan) 10 دقائق</li>
<li>لو ما نمت خلال 20 دقيقة → قم واقرأ تحت ضوء خافت</li>
</ul>

<p><strong>الصباح:</strong></p>
<ul>
<li>استيقاظ ثابت كل يوم (حتى الجمعة/السبت)</li>
<li>شمس مباشرة 15 دقيقة (تضبط الساعة البيولوجية)</li>
<li>لا قهوة قبل 90 دقيقة من الاستيقاظ</li>
</ul>

<p><strong>المكملات:</strong></p>
<ul>
<li>مغنيسيوم غليسينات: 400 ملغ قبل النوم</li>
<li>لا-ثيانين: 200 ملغ</li>
<li>جلايسين: 3 غرام (تحسن جودة النوم)</li>
<li>أشواجاندا KSM-66: 600 ملغ (يخفض الكورتيزول 27%)</li>
</ul>

<p><strong>أطعمة تساعد النوم:</strong></p>
<ul>
<li>كرز حامض (ميلاتونين طبيعي)</li>
<li>لوز ومكاديميا (مغنيسيوم)</li>
<li>أرز بني (تريبتوفان → سيروتونين → ميلاتونين)</li>
<li>موز (تريبتوفان + بوتاسيوم)</li>
</ul>
</div>

{id:'n2',title:'💡 عصير أخضر للكرش',text:'سبانخ + خيار + تفاح أخضر + زنجبيل + ليمون'},
{id:'n3',title:'🎯 هدف يومي',text:'3 لتر ماء + 30 دقيقة مشي + 15 دقيقة تأمل'}
]};

function R(){G('articles',D.articles);G('notes',D.notes)}
function G(t,items){
    const g=document.getElementById('g-'+t);if(!g)return;
    g.innerHTML=items.map((x,i)=>`<div class="card" onclick="return S('${t}','${x.id}')" style="animation-delay:${i*.07}s">${x.ico?`<div class="ico">${x.ico}</div>`:''}<h3>${x.title}</h3><div class="exc">${x.exc||x.text||''}</div><div class="meta">${x.tags?x.tags.map(t=>`<span class="tag g">#${t}</span>`).join(''):''}${x.date?`<span class="tag d">${x.date}</span>`:''}</div></div>`).join('');
}
function S(t,id){
    const items=D[t];const x=items.find(a=>a.id===id);if(!x)return!1;
    document.getElementById('L').classList.add('off');
    document.getElementById('V').classList.add('on');
    document.getElementById('C').innerHTML=`<h1>${x.ico||''} ${x.title}</h1><div class="meta-bar">${x.tags?x.tags.map(t=>`<span class="tag t">#${t}</span>`).join(''):''}${x.date?`<span class="tag g">${x.date}</span>`:''}</div><div class="content">${x.c||x.text||x.exc}</div>`;
    window.scrollTo(0,0);return!1;
}
function M(){document.querySelectorAll('.sec').forEach(s=>s.style.display='block');document.getElementById('L').classList.remove('off');document.getElementById('V').classList.remove('on');document.body.classList.remove('focus');window.scrollTo(0,0);return!1}
function F(t){document.querySelectorAll('.sec').forEach(s=>s.style.display='none');document.getElementById('s-'+t).style.display='block';document.getElementById('L').classList.remove('off');document.getElementById('V').classList.remove('on');window.scrollTo(0,0);return!1}
R();
</script>
</body>
