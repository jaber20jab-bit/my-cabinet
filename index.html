    document.getElementById('L').classList.add('off');
    document.getElementById('V').classList.add('on');
    document.getElementById('C').innerHTML=`<h1>${x.ico||''} ${x.title}</h1><div class="meta-bar">${x.tags?x.tags.map(t=>`<span class="tag t">#${t}</span>`).join(''):''}${x.date?`<span class="tag g">${x.date}</span>`:''}</div><div class="content">${x.c||x.text||x.exc}</div>`;
    window.scrollTo(0,0);return!1;
}
function M(){
    document.querySelectorAll('.sec').forEach(s=>s.style.display='block');
    document.getElementById('L').classList.remove('off');
    document.getElementById('V').classList.remove('on');
    document.body.classList.remove('focus');
    window.scrollTo(0,0);return!1;
}
function F(t){
    document.querySelectorAll('.sec').forEach(s=>s.style.display='none');
    const s=document.getElementById('s-'+t);if(s)s.style.display='block';
    document.getElementById('L').classList.remove('off');
    document.getElementById('V').classList.remove('on');
    window.scrollTo(0,0);return!1;
}
R();
</script>
</body>
