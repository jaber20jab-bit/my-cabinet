<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزانتي الرقمية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --bg-card: #0f0f0f;
            --bg-card-hover: #161616;
            --surface: #1a1a1a;
            --border: #252525;
            --text: #f0f0f0;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --purple: #a855f7;
            --green: #22c55e;
            --orange: #f97316;
            --gradient: linear-gradient(135deg, #3b82f6, #a855f7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Arabic', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: var(--surface);
        }

        /* ===== HERO ===== */
        .hero {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== STATS ===== */
        .stats {
            max-width: 900px;
            margin: 0 auto 2rem;
            padding: 0 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ===== ARTICLES ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        .section-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .article-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .article-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .article-card h3 a {
            color: var(--text);
            text-decoration: none;
        }

        .article-card:hover h3 a {
            color: var(--accent-light);
        }

        .article-excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-category {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-light);
        }

        .badge-tag {
            background: var(--surface);
            color: var(--text-muted);
        }

        .badge-date {
            background: transparent;
            color: var(--text-muted);
            margin-inline-start: auto;
        }

        /* ===== ARTICLE VIEW ===== */
        .article-view {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .article-view.active {
            display: block;
        }

        .article-list.hidden {
            display: none;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-light);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            padding: 0.5rem 1rem;
            background: rgba(59,130,246,0.1);
            border-radius: 10px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(59,130,246,0.2);
        }

        .article-view h1 {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .article-view .content {
            white-space: pre-wrap;
            line-height: 2.1;
            font-size: 1.05rem;
            color: var(--text-secondary);
        }

        /* ===== EMPTY STATE ===== */
        .empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .header { padding: 0.8rem 1rem; }
            .logo { font-size: 1.1rem; }
            .nav-links a { padding: 0.3rem 0.5rem; font-size: 0.8rem; }
            .hero { padding: 2rem 1rem 1.5rem; }
            .hero h1 { font-size: 1.5rem; }
            .hero p { font-size: 0.95rem; }
            .stats { gap: 1.5rem; }
            .stat-num { font-size: 1.4rem; }
            .container { padding: 0 1rem 2rem; }
            .article-card { padding: 1.2rem; }
            .article-card h3 { font-size: 1.05rem; }
            .badge { font-size: 0.75rem; }
            .badge-date { margin-inline-start: 0; }
            .article-view { padding: 1rem; }
            .article-view h1 { font-size: 1.3rem; }
            .article-view .content { font-size: 1rem; }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .article-card {
            animation: fadeIn 0.4s ease-out;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="#" onclick="showList()" class="logo">📚 خزانتي</a>
            <nav class="nav-links">
                <a href="#" class="active" onclick="showList()">المقالات</a>
                <a href="#" onclick="filterCategory('علوم')">علوم</a>
                <a href="#" onclick="filterCategory('صحة')">صحة</a>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">

    <div class="stats">
        <div class="stat">
            <div class="stat-num" id="stat-articles">1</div>

        <div class="stat">

            <div class="stat-label">مواضيع</div>
        </div>

    <!-- Articles List -->
    <div class="container article-list" id="articleList">
        <div class="section-label">📚 أحدث المقالات</div>
        <div id="articles"></div>
    </div>

    <!-- Article View -->
    <div class="article-view" id="articleView">
        <a href="#" onclick="showList()" class="back-btn">← العودة للمقالات</a>
        <div id="articleContent"></div>
    </div>

    <!-- Footer -->
    <footer>
        <p>صُنع بـ 🤖 بواسطة تومي • © 2026 خزانتي الرقمية</p>
    </footer>

        function renderArticles(filtered = null) {
            const data = filtered || articles;
            const container = document.getElementById('articles');
            document.getElementById('stat-articles').textContent = articles.length;

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <p>لا توجد مقالات في هذا التصنيف</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(a => `
                <div class="article-card" onclick="showArticle(${a.id})">
                    <h3><a href="#article=${a.id}">${a.title}</a></h3>
                    <div class="article-excerpt">${a.excerpt}</div>
                    <div class="article-meta">
                        <span class="badge badge-category">${a.category}</span>
                        ${a.tags.slice(0, 3).map(t => `<span class="badge badge-tag">#${t}</span>`).join('')}
                        <span class="badge badge-date">${a.date}</span>
                    </div>
                </div>
            `).join('');
        }

        function showArticle(id) {
            const article = articles.find(a => a.id === id);
            if (!article) return;

            document.getElementById('articleList').classList.add('hidden');
            const view = document.getElementById('articleView');
            view.classList.add('active');

            document.getElementById('articleContent').innerHTML = `
                <h1>${article.title}</h1>
                <div class="article-meta" style="margin-bottom: 1.5rem;">
                    <span class="badge badge-category">${article.category}</span>
                    <span class="badge badge-date">${article.date}</span>
                </div>
                <div class="content">${article.content}</div>
            `;

            window.scrollTo(0, 0);
        }

        function showList() {
            document.getElementById('articleList').classList.remove('hidden');
            document.getElementById('articleView').classList.remove('active');
            window.location.hash = '';
        }

        function filterCategory(cat) {
            const filtered = articles.filter(a => a.category === cat);
            renderArticles(filtered);
            showList();
        }

        // Handle hash navigation
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash.startsWith('#article=')) {
                const id = parseInt(hash.replace('#article=', ''));
                showArticle(id);
            } else {
                showList();
            }
        });

        // Init
        renderArticles();
        if (window.location.hash.startsWith('#article=')) {
            const id = parseInt(window.location.hash.replace('#article=', ''));
            showArticle(id);
        }
    </script>
</body>
</html>
