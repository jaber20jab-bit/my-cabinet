🔬 الآلية العلمية

1. المغنيسيوم ← يُفعّل GABA (ناقل عصبي مهدّئ) ← يهدئ الجهاز العصبي
2. التنفس البطيء ← يُفعّل العصب المبهم ← يُقلل معدل ضربات القلب
3. البروبيوتيك ← يُحسّن إنتاج السيروتونين في الأمعاء ← يتحول لميلاتونين
4. تبريد الجسم ← يُرسل إشارة "حان وقت النوم" للدماغ

✅ البروتوكول الكامل

🌅 المساء (3 ساعات قبل النوم):
• 19:00 — آخر وجبة (خفيفة، لا سكر)
• 20:00 — أوقف جميع الشاشات أو نظارات كهرمانية
• 21:00 — دش دافئ ثم تبريد الغرفة إلى 18°C
• 21:30 — مشروب: مغنيسيوم غليسينات + لا-ثيانين + كاموميل

🌙 عند الفراش (21:30-22:00):
• تنفس 4-7-8: شهيق 4 ثواني ← حبس 7 ثواني ← زفير 8 ثواني (4 تكرارات)
• تأمل الجسم (Body Scan) 10 دقائق
• إذا لم تنم خلال 20 دقيقة → قم واقرأ تحت ضوء خافت

☀️ الصباح:
• استيقاظ ثابت كل يوم (حتى الجمعة/السبت)
• شمس مباشرة 15 دقيقة (تضبط الساعة البيولوجية)
• لا قهوة قبل 90 دقيقة من الاستيقاظ

🍽️ أطعمة تساعد النوم:
• كرز حامض (ميلاتونين طبيعي)
• لوز ومكاديميا (مغنيسيوم)
• أرز بني (يحفز الأنسولين → تريبتوفان → سيروتونين → ميلاتونين)
• موز (تريبتوفان + بوتاسيوم)

💊 المكملات:
• مغنيسيوم غليسينات: 400 ملغ قبل النوم
• لا-ثيانين: 200 ملغ
• جلايسين: 3 غرام (تحسن جودة النوم)
• أشواجاندا KSM-66: 600 ملغ (يخفض الكورتيزول 27%)
